<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Scavenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=3">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="title">Senior Scavenger</div>
      <div class="tagline">check it off. rack it up.</div>
    </div>
    <div class="header-stats">
      <div class="progress-ring-wrap">
        <svg class="progress-ring" viewBox="0 0 64 64">
          <circle class="progress-ring-bg" cx="32" cy="32" r="28" />
          <circle class="progress-ring-fill" id="progressRing" cx="32" cy="32" r="28" />
        </svg>
        <div class="ring-label">
          <span class="points-number" id="pointsDisplay">0</span>
          <span class="pts-label">pts</span>
        </div>
      </div>
      <div class="task-pill" id="taskCount">0 / 0</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn share-btn" id="shareBtn" aria-label="Share progress">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z" fill="currentColor"/></svg>
      </button>
      <button class="icon-btn reset-btn" id="resetBtn" aria-label="Reset all progress">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.02 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="main" id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <span>Loading tasks<span class="loading-dots"></span></span>
  </div>
</main>

<div class="modal-overlay" id="shareModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Your Progress</span>
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>
    </div>
  </div>
</div>

<script src="app.js?v=3"></script>
</body>
</html>
