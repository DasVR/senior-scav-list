<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senior Scavenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Syne:wght@700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --card-bg: #161616;
  --pink: #ff2d78;
  --pink-soft: #ffb3cb;
  --gold: #ffd166;
  --card-border: rgba(255, 45, 120, 0.2);
  --text: #e0e0e0;
  --text-muted: #888;
  --text-dim: #555;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding-bottom: 3rem;
  -webkit-font-smoothing: antialiased;
  padding-top: 64px;
}

/* Sticky Header */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 64px;
  background: #0d0d0d;
  box-shadow: 0 1px 0 #ff2d78, 0 2px 20px rgba(255,45,120,0.3);
  display: flex;
  align-items: center;
  padding: 0 1.5rem;
}

.header-inner {
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
}

.title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.25rem;
  color: var(--pink);
  letter-spacing: -0.02em;
  white-space: nowrap;
}

.stats {
  display: flex;
  align-items: baseline;
  gap: 0.4rem;
}

.points-number {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  color: var(--pink);
  line-height: 1;
  transition: transform 0.15s ease;
}

.points-number.pulse {
  animation: counterPulse 0.3s ease;
}

@keyframes counterPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.pts-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-left: 2px;
}

.task-count-pill {
  background: transparent;
  border: 1px solid var(--pink);
  color: var(--pink-soft);
  font-size: 0.7rem;
  font-weight: 500;
  padding: 0.15rem 0.55rem;
  border-radius: 99px;
  white-space: nowrap;
  margin-left: 0.5rem;
}

.header-actions {
  display: flex;
  gap: 0.4rem;
}

.share-btn, .reset-btn {
  background: transparent;
  border: 1px solid var(--pink);
  color: var(--pink);
  padding: 0.4rem 0.85rem;
  border-radius: 99px;
  font-size: 0.72rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.share-btn:hover, .reset-btn:hover {
  background: var(--pink);
  color: #fff;
}

/* Progress bar */
.progress-bar {
  height: 3px;
  background: rgba(255, 45, 120, 0.1);
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--pink-soft));
  transition: width 0.4s ease;
  width: 0%;
}

/* Hero Section */
.hero {
  max-width: 680px;
  margin: 2.5rem auto 0;
  padding: 0 1.5rem;
  text-align: center;
  animation: heroFadeIn 0.6s ease both;
}

@keyframes heroFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 3rem;
  color: var(--pink);
  letter-spacing: -0.03em;
  line-height: 1.1;
}

.hero-tagline {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 0.95rem;
  color: var(--text-muted);
  margin-top: 0.5rem;
}

/* Radial gradient behind header */
body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 200px;
  background: radial-gradient(ellipse 600px 200px at 50% 0%, rgba(255,45,120,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Main Content */
.main {
  max-width: 680px;
  margin: 1.5rem auto 0;
  padding: 0 1rem;
  position: relative;
  z-index: 1;
}

/* Category Section */
.category {
  margin-bottom: 10px;
  border-radius: 14px;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.category:hover {
  border-color: rgba(255, 45, 120, 0.4);
  box-shadow: 0 0 20px rgba(255, 45, 120, 0.08);
}

.category.has-completions {
  border-left: 4px solid var(--pink);
}

.category-header {
  display: flex;
  align-items: center;
  padding: 18px 20px;
  cursor: pointer;
  user-select: none;
  gap: 12px;
  transition: background 0.2s;
}

.category-header:hover {
  background: rgba(255, 45, 120, 0.05);
}

.category-emoji {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
}

.chevron {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  transition: transform 0.3s ease;
  fill: var(--pink);
  opacity: 0.6;
}

.category.open .chevron {
  transform: rotate(180deg);
  opacity: 1;
}

.category-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: #fff;
  flex: 1;
}

.category-stats {
  font-size: 0.75rem;
  color: var(--text-muted);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.category-stats .cat-fraction {
  color: var(--text-muted);
}

.category-stats .cat-points {
  color: var(--pink);
  font-weight: 700;
}

.category-tasks {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

.category.open .category-tasks {
  max-height: 10000px;
}

.category-divider {
  height: 1px;
  background: rgba(255, 255, 255, 0.06);
  margin: 0;
}

/* Task Row */
.task {
  display: flex;
  align-items: center;
  padding: 14px 20px 14px 24px;
  gap: 12px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  transition: background 0.2s, opacity 0.2s;
}

.task:last-child {
  border-bottom: none;
}

.task.completed {
  opacity: 0.45;
  background: rgba(255, 45, 120, 0.04);
}

.task.completed .task-text {
  text-decoration: line-through;
  text-decoration-color: var(--pink-soft);
}

/* Custom Checkbox */
.checkbox-wrap {
  position: relative;
  flex-shrink: 0;
  width: 20px;
  height: 20px;
}

.checkbox-wrap input {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
  z-index: 2;
}

.checkbox-visual {
  position: absolute;
  inset: 0;
  border-radius: 6px;
  border: 2px solid var(--pink);
  background: transparent;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.checkbox-visual svg {
  width: 12px;
  height: 12px;
  opacity: 0;
  transform: scale(0);
  transition: all 0.15s ease;
  fill: #fff;
}

.checkbox-wrap input:checked + .checkbox-visual {
  background: var(--pink);
  border-color: var(--pink);
  animation: checkPop 0.2s ease;
}

.checkbox-wrap input:checked + .checkbox-visual svg {
  opacity: 1;
  transform: scale(1);
}

@keyframes checkPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* Bonus checkbox is gold */
.bonus-wrap {
  width: 18px;
  height: 18px;
}

.bonus-wrap .checkbox-visual {
  border-radius: 5px;
  border-width: 2px;
  border-color: var(--gold);
}

.bonus-wrap input:checked + .checkbox-visual {
  background: var(--gold);
  border-color: var(--gold);
  animation: checkPop 0.2s ease;
}

.task-content {
  flex: 1;
  min-width: 0;
}

.task-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.45;
  color: #e0e0e0;
}

.task-bonus-label {
  font-size: 0.78rem;
  color: var(--gold);
  margin-top: 0.15rem;
}

.task-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
  flex-wrap: nowrap;
}

.pts-badge {
  background: rgba(255, 45, 120, 0.12);
  color: var(--pink);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 99px;
  white-space: nowrap;
}

.bonus-badge {
  background: rgba(255, 209, 102, 0.12);
  color: var(--gold);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 99px;
  white-space: nowrap;
}

/* Modal Overlay */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  justify-content: center;
  align-items: center;
  padding: 1rem;
}

.modal-overlay.active {
  display: flex;
}

.modal {
  background: #161616;
  border: 1px solid rgba(255, 45, 120, 0.3);
  border-radius: 18px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 28px;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.25rem;
}

.modal-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--pink);
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color 0.2s;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}

.modal-close:hover {
  color: var(--pink);
}

.modal-body {
  overflow-y: auto;
  flex: 1;
}

.modal-textarea {
  width: 100%;
  min-height: 220px;
  max-height: 50vh;
  background: #0d0d0d;
  border: 1px solid rgba(255, 45, 120, 0.2);
  border-radius: 10px;
  color: #e0e0e0;
  font-family: 'DM Sans', monospace;
  font-size: 13px;
  line-height: 1.55;
  padding: 14px;
  resize: none;
  outline: none;
}

.modal-textarea:focus {
  border-color: var(--pink);
}

.modal-footer {
  margin-top: 1rem;
  display: flex;
  gap: 0.5rem;
}

.copy-btn {
  flex: 1;
  background: var(--pink);
  color: #fff;
  border: none;
  padding: 0.75rem 1rem;
  border-radius: 99px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.copy-btn:hover {
  background: #e02668;
}

.copy-btn.copied {
  background: #22c55e;
}

.modal-empty {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--pink-soft);
  font-size: 0.95rem;
}

/* Mobile */
@media (max-width: 480px) {
  .header { padding: 0 1rem; }
  .title { font-size: 1.05rem; }
  .points-number { font-size: 1.5rem; }
  .hero { margin-top: 1.5rem; padding: 0 1rem; }
  .hero-title { font-size: 2rem; }
  .hero-tagline { font-size: 0.85rem; }
  .main { padding: 0 0.5rem; }
  .category-header { padding: 14px 16px; }
  .category-name { font-size: 15px; }
  .task { padding: 12px 16px 12px 18px; gap: 10px; }
  .task-text { font-size: 13px; }
  .share-btn, .reset-btn { padding: 0.35rem 0.65rem; font-size: 0.65rem; }
  .modal { padding: 20px; border-radius: 14px; }
  .modal-textarea { font-size: 12px; min-height: 180px; }
}

/* Loading state */
.loading {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  font-size: 0.95rem;
}
</style>
</head>
<body>

<div class="header" style="position:relative;">
  <div class="header-inner">
    <div class="title">Senior Scavenger &#x1f49c;</div>
    <div class="stats">
      <div style="display:flex;align-items:baseline;gap:4px;">
        <span class="points-number" id="pointsDisplay">0</span>
        <span class="pts-label">pts</span>
      </div>
      <span class="task-count-pill" id="taskCount">0 / 0</span>
    </div>
    <div class="header-actions">
      <button class="share-btn" id="shareBtn">Share</button>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="hero">
  <div class="hero-title">Senior Scavenger &#x1f49c;</div>
  <div class="hero-tagline">check it off. rack it up.</div>
</div>

<div class="main" id="app"><div class="loading">Loading tasks...</div></div>

<script>
const CATEGORIES = [
  { id: 'social-chaos', name: 'Social Chaos', icon: '&#x1f4a5;' },
  { id: 'team-challenges', name: 'Team Challenges', icon: '&#x1f91d;' },
  { id: 'dares-body', name: 'Dares & Body', icon: '&#x1f4a6;' },
  { id: 'food-drink', name: 'Food & Drink', icon: '&#x1f357;' },
  { id: 'go-somewhere', name: 'Go Somewhere', icon: '&#x1f3af;' },
  { id: 'post-it', name: 'Post It', icon: '&#x1f4f1;' },
  { id: 'wild-cards', name: 'Wild Cards', icon: '&#x1f0cf;' },
];

const CATEGORY_RULES = [
  { id: 'post-it', patterns: ['post ', ' insta ', 'story', 'tiktok', 'tik tok', 'music video'] },
  { id: 'food-drink', patterns: ['eat', 'drink', 'shot ', 'shots', 'shotgun', 'keg stand', 'beer', 'slurpee', 'sprite and banana', '711', 'ice cream', 'slushee', 'condim', 'chip challenge', 'one chip challenge', 'krispy kreme', 'cake with chocolate', 'candy salad', 'dunkaroo', 'shoey'] },
  { id: 'go-somewhere', patterns: ['go to ', 'ride ', 'drive until', 'visit ', 'sneak into', 'zoom tan', 'rollercoaster', 'library', 'hot tub', 'elevator', 'fountain', 'church of scientology', 'hotel', 'beach', 'ocean', 'pool', 'walmart', 'publix', 'gas station', 'chili', 'bar ', 'restaurant', 'drive thru', 'drive-thru', 'mcdonald', 'walgreens', 'victoria secret', 'target', '7-eleven', '7 eleven', 'school', 'cemetery', 'golf course', 'firehouse', 'castle', 'hot tub', 'trampoline'] },
  { id: 'team-challenges', patterns: ['team ', 'teammate', 'team member', 'team dinner', 'team selfie', 'team bonding', 'group pic', 'group swim', 'group picture', 'every guy', 'each team member', 'full team', 'whole group', '4 team members', '3 team members', 'opponents team', 'opponent', 'opponent for', '4 opponents'] },
  { id: 'dares-body', patterns: ['kiss', 'make out', 'makeout', 'hair', 'shave', 'buzz cut', 'bleach', 'dye ', 'tattoo', 'piercing', 'hickey', 'eyebrow', 'waxx', 'nails', 'selfie', 'body shot', 'twerk', 'bite a stranger', 'tickle', 'bald', 'lipstick', 'forehead', 'butt', 'spit shot', 'hickey'] },
  { id: 'wild-cards', patterns: ['sky dive', 'skydive', 'speeding ticket', 'steal a street sign', 'laxatives', 'get tazed', 'get whipped', 'tazed', 'car wash with windows down', 'kidnap', 'airhorn', 'dunk a basketball', 'public dumpster', 'speed limit', 'strip club', 'peanut butter on a team', 'run out of gas'] },
  { id: 'social-chaos', patterns: [] },
];

function categorizeTask(text) {
  const lower = text.toLowerCase();
  for (const rule of CATEGORY_RULES) {
    if (rule.id === 'social-chaos') continue;
    for (const pattern of rule.patterns) {
      if (lower.includes(pattern)) return rule.id;
    }
  }
  return 'social-chaos';
}

function parseTask(line, index) {
  const trimmed = line.trim();
  if (!trimmed) return null;

  let bonusPoints = 0;
  let bonusCondition = '';
  let lineForBasePoints = trimmed;
  const bonusMatch = trimmed.match(/\(\+(\d+)\)/);
  let bonusStartIdx = -1;
  if (bonusMatch) {
    bonusPoints = parseInt(bonusMatch[1], 10);
    bonusStartIdx = trimmed.indexOf(bonusMatch[0]);
    lineForBasePoints = trimmed.substring(0, bonusStartIdx) + trimmed.substring(bonusStartIdx + bonusMatch[0].length);
  }

  let basePoints = 0;
  let taskText = lineForBasePoints.trim();
  const allBaseMatches = [...lineForBasePoints.matchAll(/\((\d+)\)/g)];
  if (allBaseMatches.length > 0) {
    const lastMatch = allBaseMatches[allBaseMatches.length - 1];
    basePoints = parseInt(lastMatch[1], 10);
    taskText = lineForBasePoints.substring(0, lastMatch.index).trim();
  }

  if (bonusMatch && allBaseMatches.length > 0) {
    const baseEndInOriginal = allBaseMatches[allBaseMatches.length - 1].index + allBaseMatches[allBaseMatches.length - 1][0].length;
    if (bonusStartIdx > baseEndInOriginal) {
      bonusCondition = trimmed.substring(baseEndInOriginal, bonusStartIdx).trim();
    }
  }

  const categoryId = categorizeTask(taskText);

  return {
    id: `task-${index}`,
    text: taskText,
    basePoints,
    bonusPoints,
    bonusCondition,
    categoryId,
  };
}

let tasks = [];
let state = {};

const STORAGE_KEY = 'seniorScav_state';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch (e) {
    state = {};
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function toggleTask(taskId) {
  state[taskId] = !state[taskId];
  saveState();
  render();
}

function toggleBonus(taskId) {
  const key = taskId + '-bonus';
  state[key] = !state[key];
  saveState();
  render();
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  state = {};
  saveState();
  render();
}

function calculatePoints() {
  let total = 0;
  let completed = 0;
  for (const task of tasks) {
    if (state[task.id]) {
      total += task.basePoints;
      completed++;
    }
    if (task.bonusPoints && state[task.id + '-bonus']) {
      total += task.bonusPoints;
    }
  }
  return { total, completed };
}

function getCategoryStats(catId) {
  const catTasks = tasks.filter(t => t.categoryId === catId);
  let completed = 0;
  let pointsAvailable = 0;
  for (const t of catTasks) {
    pointsAvailable += t.basePoints + (t.bonusPoints || 0);
    if (state[t.id]) completed++;
  }
  return { total: catTasks.length, completed, pointsAvailable };
}

function render() {
  const { total, completed } = calculatePoints();
  const totalTasks = tasks.length;

  const pointsEl = document.getElementById('pointsDisplay');
  const oldPoints = parseInt(pointsEl.textContent) || 0;
  pointsEl.textContent = total;
  if (oldPoints !== total) {
    pointsEl.classList.remove('pulse');
    void pointsEl.offsetWidth;
    pointsEl.classList.add('pulse');
  }

  document.getElementById('taskCount').textContent = completed + ' / ' + totalTasks;
  document.getElementById('progressFill').style.width = (totalTasks ? (completed / totalTasks * 100) : 0) + '%';

  const app = document.getElementById('app');
  const grouped = {};
  for (const cat of CATEGORIES) {
    grouped[cat.id] = [];
  }
  for (const task of tasks) {
    grouped[task.categoryId].push(task);
  }

  let html = '';
  for (const cat of CATEGORIES) {
    const catTasks = grouped[cat.id];
    const stats = getCategoryStats(cat.id);
    const isOpen = document.querySelector(`[data-cat="${cat.id}"]`)?.classList.contains('open') ?? (cat.id === 'social-chaos');
    const hasCompletions = stats.completed > 0 ? ' has-completions' : '';

    html += `<div class="category${isOpen ? ' open' : ''}${hasCompletions}" data-cat="${cat.id}">`;
    html += `<div class="category-header" onclick="toggleCategory('${cat.id}')">`;
    html += `<span class="category-emoji">${cat.icon}</span>`;
    html += `<span class="category-name">${cat.name}</span>`;
    html += `<span class="category-stats"><span class="cat-fraction">${stats.completed}/${stats.total}</span><span class="cat-points">${stats.pointsAvailable}pts</span></span>`;
    html += `<svg class="chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>`;
    html += `</div>`;
    html += `<div class="category-tasks">`;
    html += `<div class="category-divider"></div>`;

    for (let i = 0; i < catTasks.length; i++) {
      const task = catTasks[i];
      const checked = state[task.id] ? 'checked' : '';
      const bonusChecked = task.bonusPoints && state[task.id + '-bonus'] ? 'checked' : '';
      const completedClass = state[task.id] ? ' completed' : '';

      html += `<div class="task${completedClass}">`;
      html += `<label class="checkbox-wrap"><input type="checkbox" ${checked} onchange="toggleTask('${task.id}')"><span class="checkbox-visual"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span></label>`;
      html += `<div class="task-content"><div class="task-text">${escapeHtml(task.text)}`;
      if (task.bonusCondition) {
        html += ` <span class="task-bonus-label">(${escapeHtml(task.bonusCondition)})</span>`;
      }
      html += `</div></div>`;
      html += `<div class="task-right">`;
      if (task.basePoints > 0) {
        html += `<span class="pts-badge">${task.basePoints} pts</span>`;
      }
      if (task.bonusPoints) {
        html += `<label class="checkbox-wrap bonus-wrap"><input type="checkbox" ${bonusChecked} onchange="toggleBonus('${task.id}')"><span class="checkbox-visual"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></span></label>`;
        html += `<span class="bonus-badge">+${task.bonusPoints}</span>`;
      }
      html += `</div>`;
      html += `</div>`;
    }

    html += `</div></div>`;
  }

  app.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toggleCategory(catId) {
  const el = document.querySelector(`[data-cat="${catId}"]`);
  if (el) el.classList.toggle('open');
}

async function init() {
  loadState();

  try {
    const resp = await fetch('./tasks.txt');
    if (!resp.ok) throw new Error('Failed to load tasks.txt');
    const text = await resp.text();
    const lines = text.split('\n').filter(l => l.trim());
    tasks = lines.map((line, i) => parseTask(line, i)).filter(Boolean);
  } catch (e) {
    document.getElementById('app').innerHTML = '<div class="loading">Error loading tasks. Make sure tasks.txt is in the same directory.</div>';
    return;
  }

  render();

  const firstCat = document.querySelector('.category');
  if (firstCat) firstCat.classList.add('open');
}

document.getElementById('resetBtn').addEventListener('click', resetAll);

// Share / Export
function generateShareText() {
  const { total, completed } = calculatePoints();
  const totalTasks = tasks.length;

  if (completed === 0) {
    return 'Nothing completed yet — get out there! 🏃';
  }

  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  let text = `💜 SENIOR SCAVENGER — ${total} pts (${completed}/${totalTasks} tasks)\n`;
  text += `━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  const grouped = {};
  for (const cat of CATEGORIES) {
    grouped[cat.id] = [];
  }
  for (const task of tasks) {
    if (state[task.id]) {
      grouped[task.categoryId].push(task);
    }
  }

  for (const cat of CATEGORIES) {
    const catTasks = grouped[cat.id];
    if (catTasks.length === 0) continue;
    text += `— ${cat.name} —\n`;
    for (const task of catTasks) {
      let ptsStr = '';
      if (task.basePoints > 0) {
        ptsStr = `${task.basePoints} pts`;
      }
      if (task.bonusPoints && state[task.id + '-bonus']) {
        ptsStr = ptsStr ? `${task.basePoints + task.bonusPoints} pts (+${task.bonusPoints} bonus)` : `+${task.bonusPoints} bonus pts`;
      }
      text += `✅ ${task.text} — ${ptsStr}\n`;
    }
    text += '\n';
  }

  text += `🏆 Total: ${total} points earned\n`;
  text += `Generated ${dateStr}`;

  return text;
}

function openShareModal() {
  const modal = document.getElementById('shareModal');
  const body = document.getElementById('modalBody');
  const shareText = generateShareText();

  if (shareText === 'Nothing completed yet — get out there! 🏃') {
    body.innerHTML = `<div class="modal-empty">${shareText}</div>`;
    document.getElementById('copyBtn').style.display = 'none';
  } else {
    body.innerHTML = `<textarea class="modal-textarea" id="shareTextarea" readonly>${escapeHtml(shareText)}</textarea>`;
    document.getElementById('copyBtn').style.display = '';
  }

  modal.classList.add('active');
  document.body.style.overflow = 'hidden';

  requestAnimationFrame(() => {
    const ta = document.getElementById('shareTextarea');
    if (ta) {
      ta.focus();
      ta.setSelectionRange(0, ta.value.length);
    }
  });

  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = 'Copy to Clipboard';
  copyBtn.classList.remove('copied');
}

function closeShareModal() {
  const modal = document.getElementById('shareModal');
  modal.classList.remove('active');
  document.body.style.overflow = '';
}

function copyShareText() {
  const textarea = document.getElementById('shareTextarea');
  if (!textarea) return;

  const copyBtn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(textarea.value).then(() => {
    copyBtn.textContent = 'Copied! ✓';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = 'Copy to Clipboard';
      copyBtn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    textarea.select();
    document.execCommand('copy');
    copyBtn.textContent = 'Copied! ✓';
    copyBtn.classList.add('copied');
    setTimeout(() => {
      copyBtn.textContent = 'Copy to Clipboard';
      copyBtn.classList.remove('copied');
    }, 2000);
  });
}

document.getElementById('shareBtn').addEventListener('click', openShareModal);
document.getElementById('modalClose').addEventListener('click', closeShareModal);
document.getElementById('copyBtn').addEventListener('click', copyShareText);
document.getElementById('shareModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeShareModal();
});

init();
</script>

<div class="modal-overlay" id="shareModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Your Progress &#x1f49c;</span>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>
    </div>
  </div>
</div>
</html>
